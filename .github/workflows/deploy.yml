name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_WAITLIST_ENDPOINT: ${{ secrets.NEXT_PUBLIC_WAITLIST_ENDPOINT }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3 with --delete
        run: |
          aws s3 sync out/ s3://housemoneyportfolio.com/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Overwrite HTML with no-cache headers
        run: |
          aws s3 cp out/ s3://housemoneyportfolio.com/ \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
