<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d2b24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle emerald glow top-right -->
  <circle cx="1050" cy="120" r="300" fill="#0D9B7A" fill-opacity="0.08"/>

  <!-- Left emerald accent bar -->
  <rect x="80" y="200" width="6" height="230" rx="3" fill="#0D9B7A"/>

  <!-- Logo circle (simplified chip) -->
  <circle cx="130" cy="130" r="42" fill="#0D9B7A"/>
  <circle cx="130" cy="130" r="34" fill="#19c49b" stroke="#0D9B7A" stroke-width="2"/>
  <circle cx="130" cy="130" r="27" fill="#0D9B7A" stroke="#e1a73a" stroke-width="3"/>
  <!-- bar chart mark inside logo -->
  <rect x="118" y="121" width="5" height="16" rx="1" fill="rgba(255,255,255,0.85)"/>
  <rect x="127" y="116" width="5" height="21" rx="1" fill="rgba(255,255,255,0.85)"/>
  <rect x="136" y="111" width="5" height="26" rx="1" fill="rgba(255,255,255,0.85)"/>
  <!-- trend arrow -->
  <path d="M119 112l16-10 8 6 12-10" fill="none" stroke="#e1a73a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="185" y="122" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700" letter-spacing="1" fill="rgba(255,255,255,0.92)">HOUSE MONEY</text>
  <text x="185" y="155" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="5" fill="#e1a73a">PORTFOLIO</text>

  <!-- Headline -->
  <text x="96" y="270" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="-1" fill="white">Stop guessing.</text>
  <text x="96" y="348" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="-1" fill="#0D9B7A">Start knowing.</text>

  <!-- Subheadline -->
  <text x="96" y="420" font-family="Inter, Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.55)" letter-spacing="0">The intelligent portfolio tracker built for</text>
  <text x="96" y="452" font-family="Inter, Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.55)">serious retail investors.</text>

  <!-- Moat pills -->
  <rect x="96" y="500" width="210" height="44" rx="22" fill="#0D9B7A" fill-opacity="0.2" stroke="#0D9B7A" stroke-width="1"/>
  <text x="201" y="527" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#19c49b" text-anchor="middle">Unified Portfolio</text>

  <rect x="322" y="500" width="180" height="44" rx="22" fill="#0D9B7A" fill-opacity="0.2" stroke="#0D9B7A" stroke-width="1"/>
  <text x="412" y="527" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#19c49b" text-anchor="middle">Live Signals</text>

  <rect x="518" y="500" width="200" height="44" rx="22" fill="#0D9B7A" fill-opacity="0.2" stroke="#0D9B7A" stroke-width="1"/>
  <text x="618" y="527" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#19c49b" text-anchor="middle">Risk Attribution</text>

  <!-- Domain -->
  <text x="1104" y="587" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.25)" text-anchor="end">housemoneyportfolio.com</text>
</svg>
